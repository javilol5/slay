<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Here to Slay</title>

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #2c2c2c;
            color: white;
            text-align: center;
        }

        #board {
            border: 2px solid white;
            margin: 20px;
            padding: 20px;
            min-height: 150px;
            position: relative;
            height: 400px;
        }

        .card {
            position: absolute;
            cursor: grab;
        }

        #hand {
            border: 2px solid yellow;
            margin: 20px;
            padding: 20px;
            min-height: 150px;
        }

        .card {
            display: inline-block;
            border: 1px solid white;
            padding: 10px;
            margin: 5px;
            background: #444;
        }

        .card img {
            width: 80px;
            height: auto;
            pointer-events: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>Here To Slay</h1>

<button onclick="drawCard()">Robar carta</button>

<h2>Tablero (público)</h2>
<div id="board"></div>

<h2>Tu mano (privada)</h2>
<div id="hand"></div>

<script>
    let stompClient = null;
    let playerId = "player" + Math.floor(Math.random() * 1000);

    function connect() {
        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, function () {

            console.log("Conectado como:", playerId);

            stompClient.subscribe('/topic/game', function (msg) {
                console.log("GAME:", msg.body);
            });

            stompClient.subscribe('/user/queue/hand', function (msg) {
                console.log("HAND:", msg.body);
                const hand = JSON.parse(msg.body);
                renderHand(hand);
            });

        });
    }

    // ✅ IMPORTANTE: FUNCIÓN GLOBAL
    function drawCard() {
        console.log("CLICK en robar carta");
        stompClient.send("/app/draw", {}, playerId);
    }

    function renderHand(hand) {
        const handDiv = document.getElementById("hand");
        handDiv.innerHTML = "";

        hand.forEach(card => {
            const div = document.createElement("div");
            div.innerText = card.name;
            handDiv.appendChild(div);
        });
    }

    connect();
</script>

</body>
</html>
